<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS - Premium Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        * {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 25%, #2d0a3f 50%, #1a0a2e 75%, #0a0e27 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Animated background orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            pointer-events: none;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #00d4ff, transparent);
            top: -100px;
            right: -100px;
            animation: float1 20s ease-in-out infinite;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #ff00ff, transparent);
            bottom: -50px;
            left: -50px;
            animation: float2 25s ease-in-out infinite;
        }

        .orb-3 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, #9d00ff, transparent);
            top: 50%;
            left: 10%;
            animation: float3 22s ease-in-out infinite;
        }

        @keyframes float1 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, 30px); }
        }

        @keyframes float2 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-30px, -30px); }
        }

        @keyframes float3 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-40px, 40px); }
        }

        /* Glassmorphism container */
        .calculator-container {
            background: rgba(15, 15, 35, 0.7);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 212, 255, 0.2),
                        inset 0 1px 1px rgba(255, 255, 255, 0.1);
            max-width: 380px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        /* Display */
        .display {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(157, 0, 255, 0.1));
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2),
                        inset 0 0 20px rgba(0, 212, 255, 0.1),
                        0 0 40px rgba(157, 0, 255, 0.1);
            text-align: right;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            position: relative;
            overflow: hidden;
        }

        .display::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, transparent 0%, rgba(255, 255, 255, 0.05) 50%, transparent 100%);
            pointer-events: none;
        }

        .display-value {
            font-size: 3rem;
            font-weight: 700;
            color: #00d4ff;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5),
                         0 0 40px rgba(0, 212, 255, 0.3);
            letter-spacing: 2px;
            position: relative;
            z-index: 1;
            word-break: break-all;
            animation: glowPulse 2s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { text-shadow: 0 0 20px rgba(0, 212, 255, 0.5), 0 0 40px rgba(0, 212, 255, 0.3); }
            50% { text-shadow: 0 0 30px rgba(0, 212, 255, 0.7), 0 0 60px rgba(0, 212, 255, 0.5); }
        }

        .display-operator {
            font-size: 0.9rem;
            color: rgba(0, 212, 255, 0.6);
            margin-bottom: 5px;
            height: 20px;
            position: relative;
            z-index: 1;
        }

        /* Button grid */
        .button-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        /* Buttons */
        .btn {
            padding: 20px;
            border: none;
            border-radius: 16px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, rgba(100, 100, 150, 0.3), rgba(50, 50, 100, 0.3));
            border: 1px solid rgba(0, 212, 255, 0.2);
            color: #e0e0ff;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.1),
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, transparent 0%, rgba(255, 255, 255, 0.1) 50%, transparent 100%);
            pointer-events: none;
            border-radius: 16px;
        }

        .btn:hover {
            background: linear-gradient(135deg, rgba(120, 120, 180, 0.5), rgba(70, 70, 130, 0.5));
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.3),
                        inset 0 1px 0 rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* Operator buttons (purple/pink glow) */
        .btn-operator {
            background: linear-gradient(135deg, rgba(157, 0, 255, 0.3), rgba(255, 0, 127, 0.3));
            border: 1px solid rgba(157, 0, 255, 0.4);
            color: #ff00ff;
            box-shadow: 0 0 15px rgba(157, 0, 255, 0.2),
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            text-shadow: 0 0 10px rgba(157, 0, 255, 0.5);
        }

        .btn-operator:hover {
            background: linear-gradient(135deg, rgba(200, 0, 255, 0.5), rgba(255, 50, 150, 0.5));
            box-shadow: 0 0 30px rgba(157, 0, 255, 0.4),
                        inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        /* Equals button (cyan/blue glow) */
        .btn-equals {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.4), rgba(0, 100, 200, 0.4));
            border: 1px solid rgba(0, 212, 255, 0.5);
            color: #00ffff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3),
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            text-shadow: 0 0 15px rgba(0, 212, 255, 0.6);
            grid-column: span 2;
        }

        .btn-equals:hover {
            background: linear-gradient(135deg, rgba(50, 220, 255, 0.6), rgba(50, 150, 255, 0.6));
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.5),
                        inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        /* Clear button */
        .btn-clear {
            background: linear-gradient(135deg, rgba(255, 50, 50, 0.3), rgba(150, 0, 50, 0.3));
            border: 1px solid rgba(255, 50, 50, 0.4);
            color: #ff6b6b;
            box-shadow: 0 0 15px rgba(255, 50, 50, 0.2),
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            text-shadow: 0 0 10px rgba(255, 50, 50, 0.5);
        }

        .btn-clear:hover {
            background: linear-gradient(135deg, rgba(255, 100, 100, 0.5), rgba(200, 50, 100, 0.5));
            box-shadow: 0 0 25px rgba(255, 50, 50, 0.3),
                        inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        /* Backspace button */
        .btn-backspace {
            background: linear-gradient(135deg, rgba(255, 150, 0, 0.3), rgba(200, 100, 0, 0.3));
            border: 1px solid rgba(255, 150, 0, 0.4);
            color: #ffb347;
            box-shadow: 0 0 15px rgba(255, 150, 0, 0.2),
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            text-shadow: 0 0 10px rgba(255, 150, 0, 0.5);
        }

        .btn-backspace:hover {
            background: linear-gradient(135deg, rgba(255, 180, 50, 0.5), rgba(230, 130, 50, 0.5));
            box-shadow: 0 0 25px rgba(255, 150, 0, 0.3),
                        inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        /* Ripple effect */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.5), transparent);
            pointer-events: none;
        }

        /* Number entry animation */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .number-enter {
            animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Error shake animation */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .shake {
            animation: shake 0.5s ease-in-out;
        }

        /* Result bounce animation */
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .bounce {
            animation: bounce 0.5s ease-in-out;
        }

        /* Button press animation */
        @keyframes buttonPress {
            0% { transform: scale(1); }
            50% { transform: scale(0.95); }
            100% { transform: scale(1); }
        }

        .button-press {
            animation: buttonPress 0.2s ease-out;
        }

        /* Glow pulse on button */
        @keyframes glowPulseButton {
            0%, 100% { 
                box-shadow: 0 0 15px rgba(0, 212, 255, 0.1);
            }
            50% { 
                box-shadow: 0 0 30px rgba(0, 212, 255, 0.3),
                            0 0 50px rgba(157, 0, 255, 0.2);
            }
        }

        .btn:not(.btn-clear):not(.btn-backspace):not(.btn-operator):not(.btn-equals) {
            animation: glowPulseButton 3s ease-in-out infinite;
        }

        /* Sound toggle */
        .sound-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, rgba(100, 100, 150, 0.3), rgba(50, 50, 100, 0.3));
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 12px;
            padding: 12px 16px;
            cursor: pointer;
            z-index: 100;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            color: #00d4ff;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.1);
        }

        .sound-toggle:hover {
            background: linear-gradient(135deg, rgba(120, 120, 180, 0.5), rgba(70, 70, 130, 0.5));
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.3);
            transform: translateY(-2px);
        }

        /* Mobile optimization */
        @media (max-width: 480px) {
            .calculator-container {
                padding: 20px;
                margin: 20px;
                border-radius: 25px;
            }

            .display-value {
                font-size: 2.5rem;
            }

            .btn {
                padding: 18px;
                font-size: 1.1rem;
            }

            .button-grid {
                gap: 10px;
            }

            .sound-toggle {
                top: 15px;
                right: 15px;
                padding: 10px 14px;
                font-size: 1rem;
            }

            body {
                padding: 10px;
            }
        }

        /* Tablet optimization */
        @media (max-width: 1024px) and (min-width: 481px) {
            .calculator-container {
                max-width: 90vw;
            }
        }
    </style>
</head>
<body>
    <!-- Animated background orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Sound toggle -->
    <button class="sound-toggle" id="soundToggle" title="Toggle sound">🔊</button>

    <!-- Main calculator -->
    <div class="calculator-container">
        <!-- Display -->
        <div class="display" id="display">
            <div class="display-operator" id="operator"></div>
            <div class="display-value" id="displayValue">0</div>
        </div>

        <!-- Button grid -->
        <div class="button-grid">
            <!-- Row 1 -->
            <button class="btn btn-clear" data-action="clear">C</button>
            <button class="btn btn-backspace" data-action="backspace">⌫</button>
            <button class="btn btn-operator" data-operator="%">%</button>
            <button class="btn btn-operator" data-operator="/">÷</button>

            <!-- Row 2 -->
            <button class="btn" data-number="7">7</button>
            <button class="btn" data-number="8">8</button>
            <button class="btn" data-number="9">9</button>
            <button class="btn btn-operator" data-operator="*">×</button>

            <!-- Row 3 -->
            <button class="btn" data-number="4">4</button>
            <button class="btn" data-number="5">5</button>
            <button class="btn" data-number="6">6</button>
            <button class="btn btn-operator" data-operator="-">−</button>

            <!-- Row 4 -->
            <button class="btn" data-number="1">1</button>
            <button class="btn" data-number="2">2</button>
            <button class="btn" data-number="3">3</button>
            <button class="btn btn-operator" data-operator="+">+</button>

            <!-- Row 5 -->
            <button class="btn" data-number="0" style="grid-column: span 2;">0</button>
            <button class="btn" data-number=".">.</button>
            <button class="btn btn-equals" data-action="equals">=</button>
        </div>
    </div>

    <script>
        // ===== SOUND ENGINE =====
        class SoundEngine {
            constructor() {
                this.audioContext = null;
                this.soundEnabled = true;
                this.initialized = false;
            }

            init() {
                if (this.initialized) return;
                
                try {
                    const audioContext = window.AudioContext || window.webkitAudioContext;
                    this.audioContext = new audioContext();
                    this.initialized = true;
                } catch (e) {
                    console.log('Web Audio API not supported');
                    this.soundEnabled = false;
                }
            }

            playSound(frequency, duration, type = 'sine') {
                if (!this.soundEnabled || !this.initialized) return;

                try {
                    const ctx = this.audioContext;
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();

                    osc.connect(gain);
                    gain.connect(ctx.destination);

                    osc.type = type;
                    osc.frequency.setValueAtTime(frequency, ctx.currentTime);
                    gain.gain.setValueAtTime(0.3, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);

                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + duration);
                } catch (e) {
                    console.log('Sound playback error:', e);
                }
            }

            click() {
                this.playSound(800, 0.05, 'sine');
            }

            operator() {
                this.playSound(650, 0.08, 'square');
            }

            equals() {
                const ctx = this.audioContext;
                this.playSound(1000, 0.1, 'sine');
                setTimeout(() => this.playSound(1200, 0.1, 'sine'), 50);
            }

            error() {
                this.playSound(300, 0.15, 'sine');
                setTimeout(() => this.playSound(200, 0.15, 'sine'), 100);
            }

            toggle() {
                this.soundEnabled = !this.soundEnabled;
                return this.soundEnabled;
            }
        }

        // ===== ANIMATION ENGINE =====
        class AnimationEngine {
            static buttonPress(element) {
                gsap.to(element, {
                    scale: 0.95,
                    duration: 0.1,
                    yoyo: true,
                    repeat: 1,
                    ease: 'power2.out'
                });

                this.createRipple(element);
            }

            static createRipple(element) {
                const ripple = document.createElement('div');
                ripple.className = 'ripple';
                const rect = element.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);

                ripple.style.width = ripple.style.height = size + 'px';
                ripple.style.left = (rect.width - size) / 2 + 'px';
                ripple.style.top = (rect.height - size) / 2 + 'px';

                element.style.position = 'relative';
                element.appendChild(ripple);

                gsap.to(ripple, {
                    scale: 2,
                    opacity: 0,
                    duration: 0.6,
                    ease: 'power2.out',
                    onComplete: () => ripple.remove()
                });
            }

            static displayChange() {
                const display = document.getElementById('displayValue');
                gsap.fromTo(display,
                    { opacity: 0, y: 10 },
                    { opacity: 1, y: 0, duration: 0.3, ease: 'back.out' }
                );
            }

            static shake() {
                const display = document.getElementById('display');
                gsap.to(display, {
                    x: -10,
                    duration: 0.05,
                    repeat: 5,
                    yoyo: true,
                    ease: 'sine.inOut'
                });
            }

            static bounce() {
                const display = document.getElementById('displayValue');
                gsap.to(display, {
                    scale: 1.1,
                    duration: 0.3,
                    yoyo: true,
                    repeat: 1,
                    ease: 'back.out'
                });
            }
        }

        // ===== CALCULATOR LOGIC =====
        class CalculatorLogic {
            constructor() {
                this.displayValue = '0';
                this.previousValue = null;
                this.operation = null;
                this.waitingForNewValue = false;
            }

            append(value) {
                if (this.waitingForNewValue) {
                    this.displayValue = String(value);
                    this.waitingForNewValue = false;
                } else {
                    this.displayValue = this.displayValue === '0' ? String(value) : this.displayValue + value;
                }
                return this.displayValue;
            }

            setOperation(op) {
                if (this.operation !== null && !this.waitingForNewValue) {
                    this.calculate();
                }
                this.previousValue = parseFloat(this.displayValue);
                this.operation = op;
                this.waitingForNewValue = true;
                return op;
            }

            calculate() {
                if (this.operation === null || this.previousValue === null) return this.displayValue;

                const current = parseFloat(this.displayValue);
                let result = 0;

                switch (this.operation) {
                    case '+': result = this.previousValue + current; break;
                    case '-': result = this.previousValue - current; break;
                    case '*': result = this.previousValue * current; break;
                    case '/': result = current !== 0 ? this.previousValue / current : 0; break;
                    case '%': result = this.previousValue % current; break;
                }

                this.displayValue = String(Math.round(result * 100000000) / 100000000);
                this.operation = null;
                this.waitingForNewValue = true;
                return this.displayValue;
            }

            clear() {
                this.displayValue = '0';
                this.previousValue = null;
                this.operation = null;
                this.waitingForNewValue = false;
            }

            backspace() {
                if (this.displayValue.length > 1) {
                    this.displayValue = this.displayValue.slice(0, -1);
                } else {
                    this.displayValue = '0';
                }
                return this.displayValue;
            }

            addDecimal() {
                if (!this.displayValue.includes('.')) {
                    this.displayValue += '.';
                }
                return this.displayValue;
            }
        }

        // ===== MAIN APP =====
        class CalculatorApp {
            constructor() {
                this.logic = new CalculatorLogic();
                this.soundEngine = new SoundEngine();
                this.soundEngine.init();
                this.setupEventListeners();
                this.updateDisplay();
            }

            setupEventListeners() {
                // Number buttons
                document.querySelectorAll('[data-number]').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        this.soundEngine.click();
                        AnimationEngine.buttonPress(btn);
                        
                        if (e.target.textContent === '.') {
                            this.logic.addDecimal();
                        } else {
                            this.logic.append(e.target.textContent);
                        }
                        this.updateDisplay();
                    });
                });

                // Operator buttons
                document.querySelectorAll('[data-operator]').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        this.soundEngine.operator();
                        AnimationEngine.buttonPress(btn);
                        this.logic.setOperation(e.target.dataset.operator);
                        this.updateDisplay();
                    });
                });

                // Action buttons
                document.querySelector('[data-action="clear"]').addEventListener('click', (e) => {
                    this.soundEngine.click();
                    AnimationEngine.buttonPress(e.target);
                    this.logic.clear();
                    this.updateDisplay();
                });

                document.querySelector('[data-action="backspace"]').addEventListener('click', (e) => {
                    this.soundEngine.click();
                    AnimationEngine.buttonPress(e.target);
                    this.logic.backspace();
                    this.updateDisplay();
                });

                document.querySelector('[data-action="equals"]').addEventListener('click', (e) => {
                    this.soundEngine.equals();
                    AnimationEngine.buttonPress(e.target);
                    AnimationEngine.bounce();
                    this.logic.calculate();
                    this.updateDisplay();
                });

                // Sound toggle
                document.getElementById('soundToggle').addEventListener('click', (e) => {
                    const enabled = this.soundEngine.toggle();
                    e.target.textContent = enabled ? '🔊' : '🔇';
                    e.target.style.opacity = enabled ? '1' : '0.5';
                });

                // Keyboard support
                document.addEventListener('keydown', (e) => {
                    if (e.key >= '0' && e.key <= '9') {
                        this.logic.append(e.key);
                        this.soundEngine.click();
                    } else if (e.key === '.') {
                        this.logic.addDecimal();
                        this.soundEngine.click();
                    } else if (e.key === '+' || e.key === '-' || e.key === '*' || e.key === '/') {
                        this.logic.setOperation(e.key);
                        this.soundEngine.operator();
                    } else if (e.key === 'Enter' || e.key === '=') {
                        this.logic.calculate();
                        this.soundEngine.equals();
                        AnimationEngine.bounce();
                    } else if (e.key === 'Backspace') {
                        this.logic.backspace();
                        this.soundEngine.click();
                    } else if (e.key.toLowerCase() === 'c') {
                        this.logic.clear();
                        this.soundEngine.click();
                    }
                    this.updateDisplay();
                });

                // Touch feedback on mobile
                document.querySelectorAll('.btn').forEach(btn => {
                    btn.addEventListener('touchstart', () => {
                        if (navigator.vibrate) {
                            navigator.vibrate(10);
                        }
                    });
                });
            }

            updateDisplay() {
                const display = document.getElementById('displayValue');
                const operator = document.getElementById('operator');

                display.textContent = this.logic.displayValue.length > 15 
                    ? this.logic.displayValue.substring(0, 15) + '...'
                    : this.logic.displayValue;

                if (this.logic.operation) {
                    operator.textContent = this.logic.operation;
                } else {
                    operator.textContent = '';
                }

                AnimationEngine.displayChange();
            }
        }

        // Initialize app on load
        document.addEventListener('DOMContentLoaded', () => {
            new CalculatorApp();

            // Page load animation
            gsap.from('.calculator-container', {
                scale: 0.9,
                opacity: 0,
                duration: 0.6,
                ease: 'back.out'
            });
        });
    </script>
</body>
</html>
