<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <title>CALCORA - Advanced Calculator Pro</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        neon: {
                            cyan: '#00d9ff',
                            pink: '#ff006e',
                            purple: '#b537f2',
                            green: '#00ff00',
                            yellow: '#ffbe0b'
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }

        @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }

        /* Animated Background */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(-45deg, #0f172a, #1e293b, #0f172a, #1a1a2e);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glass.premium {
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.2);
        }

        /* Button Ripple */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.8), transparent);
            transform: scale(0);
            pointer-events: none;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 217, 255, 0.3);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 217, 255, 0.6);
        }

        .transition-smooth {
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Button Styles */
        .btn-number, .btn-operator, .btn-clear, .btn-equals, .btn-function {
            @apply rounded-xl font-semibold transition-smooth relative overflow-hidden cursor-pointer;
            min-height: 3rem;
        }

        .btn-number {
            @apply bg-slate-700/20 hover:bg-slate-700/40 active:bg-slate-700/60 border border-slate-600/30;
            @apply text-white;
        }

        .btn-operator {
            @apply bg-neon-cyan/10 hover:bg-neon-cyan/20 border border-neon-cyan/40;
            @apply text-neon-cyan;
        }

        .btn-clear {
            @apply bg-neon-yellow/10 hover:bg-neon-yellow/20 border border-neon-yellow/40;
            @apply text-neon-yellow;
        }

        .btn-equals {
            @apply bg-gradient-to-r from-neon-pink/20 to-neon-yellow/10 hover:from-neon-pink/30 border border-neon-pink/40;
            @apply text-neon-pink;
        }

        .btn-function {
            @apply bg-neon-purple/10 hover:bg-neon-purple/20 border border-neon-purple/40;
            @apply text-neon-purple text-sm;
        }

        /* Enhanced Glow Effects */
        .btn-number:hover {
            box-shadow: 0 0 15px rgba(0, 217, 255, 0.3), inset 0 0 10px rgba(255, 255, 255, 0.05);
        }

        .btn-operator:hover, .btn-function:hover {
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.6), inset 0 0 15px rgba(0, 217, 255, 0.1);
            text-shadow: 0 0 10px rgba(0, 217, 255, 0.8);
        }

        .btn-clear:hover {
            box-shadow: 0 0 20px rgba(255, 190, 11, 0.6), inset 0 0 15px rgba(255, 190, 11, 0.1);
            text-shadow: 0 0 8px rgba(255, 190, 11, 0.6);
        }

        .btn-equals:hover {
            box-shadow: 0 0 25px rgba(255, 0, 110, 0.7), 0 0 40px rgba(255, 190, 11, 0.5), inset 0 0 15px rgba(255, 0, 110, 0.1);
        }

        /* Advanced Button Press */
        .btn-number:active, .btn-operator:active, .btn-clear:active, .btn-equals:active, .btn-function:active {
            transform: scale(0.92) translateY(2px);
        }

        /* Display Glow */
        #display {
            text-shadow: 0 0 10px rgba(0, 217, 255, 0.8);
        }

        /* Sound Pulse Animation */
        @keyframes sound-pulse {
            0%, 100% { text-shadow: 0 0 5px rgba(0, 217, 255, 0.5); }
            50% { text-shadow: 0 0 15px rgba(0, 217, 255, 1); }
        }

        .sound-pulse {
            animation: sound-pulse 0.3s ease-out;
        }

        @media (max-width: 480px) {
            .calculator-grid {
                gap: 0.5rem !important;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body class="bg-slate-950 text-white">
    <div class="animated-bg"></div>

    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="container mx-auto max-w-md">
            <!-- Header -->
            <div class="flex items-center justify-between mb-6">
                <div>
                    <h1 class="text-4xl font-black bg-gradient-to-r from-cyan-300 via-blue-400 to-purple-500 bg-clip-text text-transparent drop-shadow-lg" style="text-shadow: 0 0 20px rgba(0, 217, 255, 0.4);">
                        CALCORA
                    </h1>
                    <p class="text-xs text-cyan-400/70 font-semibold tracking-widest">PRO CALCULATOR</p>
                </div>
                <div class="flex gap-3">
                    <button id="historyBtn" class="glass p-3 rounded-full transition-smooth hover:scale-110 active:scale-95" 
                            title="Calculation History" aria-label="History">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                    </button>
                    <button id="soundBtn" class="glass p-3 rounded-full transition-smooth hover:scale-110 active:scale-95" 
                            title="Toggle Sound" aria-label="Sound">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M13.5 4.06c0-1.336-1.616-2.318-2.798-1.553L5.683 6H2a2 2 0 00-2 2v6a2 2 0 002 2h3.683l5.019 3.485c1.182.765 2.798-.217 2.798-1.553V4.06z"/>
                        </svg>
                    </button>
                    <button id="themeBtn" class="glass p-3 rounded-full transition-smooth hover:scale-110 active:scale-95" 
                            title="Toggle Theme" aria-label="Theme">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0119.8-4.3M22 4.5a10 10 0 01-19.8 15.2"/>
                        </svg>
                    </button>
                    <button id="scientificBtn" class="glass p-3 rounded-full transition-smooth hover:scale-110 active:scale-95" 
                            title="Scientific Mode" aria-label="Scientific">
                        <span class="text-sm font-bold">f(x)</span>
                    </button>
                </div>
            </div>

            <!-- History Panel -->
            <div id="historyPanel" class="glass premium rounded-3xl p-4 mb-4 max-h-48 overflow-y-auto hidden">
                <h3 class="text-sm font-semibold text-cyan-400 mb-3 uppercase tracking-wider">History</h3>
                <div id="historyList" class="space-y-2">
                    <!-- History items here -->
                </div>
            </div>

            <!-- Memory Indicator -->
            <div id="memoryIndicator" class="text-center text-xs text-cyan-400 mb-2 hidden" style="letter-spacing: 0.1em;">
                Memory: <span id="memoryValue">0</span>
            </div>

            <!-- Main Calculator -->
            <div class="glass premium rounded-3xl p-6 backdrop-blur-xl">
                <!-- Display -->
                <div class="mb-6">
                    <div id="displayHistory" class="text-right text-sm text-gray-400 min-h-[20px] mb-2 overflow-hidden text-ellipsis whitespace-nowrap"></div>
                    <div class="bg-gradient-to-br from-cyan-400/10 to-pink-500/10 rounded-2xl p-4 border border-cyan-400/30 backdrop-blur">
                        <div id="display" class="text-right text-5xl font-light text-cyan-400 break-all overflow-hidden max-h-24">
                            0
                        </div>
                    </div>
                </div>

                <!-- Standard Buttons Grid -->
                <div class="calculator-grid grid grid-cols-4 gap-3 mb-4">
                    <button class="btn-clear" data-action="clear" aria-label="All Clear">AC</button>
                    <button class="btn-clear" data-action="delete" aria-label="Delete">DEL</button>

                <div id="memoryButtons" class="grid grid-cols-4 gap-3 hidden">
                    <button class="btn-function" data-action="memAdd">M+</button>

            <!-- Sound & Volume Control -->
            <div class="mt-4 grid grid-cols-2 gap-3">
                <div class="glass rounded-xl p-4">
                    <label for="volumeControl" class="text-xs uppercase tracking-wider text-cyan-400 font-bold block mb-2">🔊 Volume</label>
                    <input type="range" id="volumeControl" min="0" max="100" value="50" class="w-full accent-cyan-400 cursor-pointer">
                    <span id="volumePercent" class="text-xs text-cyan-400 mt-2 block text-center font-semibold">50%</span>
                </div>
                <div class="glass rounded-xl p-4 flex flex-col justify-center items-center text-center hover:bg-cyan-400/10 transition-all">
                    <div id="soundIcon" class="text-4xl mb-2 transition-transform">🔊</div>
                    <span class="text-xs text-cyan-400 font-semibold">Sound Active</span>
                </div>

        </div>
    </div>

    <script>
        // Sound Engine with Web Audio API
        class SoundEngine {
            constructor() {
                this.audioContext = null;
                this.masterGain = null;
                this.enabled = localStorage.getItem('soundEnabled') !== 'false';
                this.volume = parseFloat(localStorage.getItem('volume')) || 0.5;
                this.init();
            }

            init() {
                try {
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    this.masterGain = this.audioContext.createGain();
                    this.masterGain.connect(this.audioContext.destination);
                    this.masterGain.gain.value = this.volume;
                } catch (e) {
                    console.warn('AudioContext not available');
                }
            }

            setVolume(value) {
                this.volume = value;
                if (this.masterGain) this.masterGain.gain.value = value;
                localStorage.setItem('volume', value);
            }

            playSound(type) {
                if (!this.enabled || !this.audioContext) return;
                const ctx = this.audioContext;
                const now = ctx.currentTime;

                if (type === 'click') {
                    this.playTone(850, 650, 0.12, 0.05);
                } else if (type === 'operator') {
                    this.playTone(720, 580, 0.15, 0.08);
                } else if (type === 'equals') {
                    this.playChord([523.25, 659.25, 783.99], 0.2, 0.15);
                } else if (type === 'error') {
                    this.playTone(350, 250, 0.15, 0.1);
                }
            }

            playTone(startFreq, endFreq, duration, delay = 0) {
                const ctx = this.audioContext;
                const now = ctx.currentTime;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();

                osc.connect(gain);
                gain.connect(this.masterGain);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(startFreq, now + delay);
                osc.frequency.exponentialRampToValueAtTime(endFreq, now + delay + duration);
                gain.gain.setValueAtTime(0.1, now + delay);
                gain.gain.exponentialRampToValueAtTime(0.01, now + delay + duration);
                osc.start(now + delay);
                osc.stop(now + delay + duration);
            }

            playChord(frequencies, duration, delay = 0) {
                frequencies.forEach((freq, idx) => {
                    this.playTone(freq, freq * 0.7, duration, delay + idx * 0.03);
                });
            }

            toggle() {
                this.enabled = !this.enabled;
                localStorage.setItem('soundEnabled', this.enabled);
                return this.enabled;
            }
        }

        // Animation Engine using GSAP
        class AnimationEngine {
            static buttonPress(element) {
                gsap.to(element, { scale: 0.95, duration: 0.1, overwrite: 'auto' });
                gsap.to(element, { scale: 1, duration: 0.3, delay: 0.1, ease: 'back.out', overwrite: 'auto' });
            }

            static ripple(element, x, y) {
                const ripple = document.createElement('div');
                ripple.classList.add('ripple');
                const rect = element.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                ripple.style.width = ripple.style.height = size + 'px';
                ripple.style.left = (x - rect.left - size / 2) + 'px';
                ripple.style.top = (y - rect.top - size / 2) + 'px';
                element.appendChild(ripple);

                gsap.to(ripple, {
                    scale: 4, opacity: 0, duration: 0.6, ease: 'power2.out',
                    onComplete: () => ripple.remove()
                });
            }

            static slideUpNumber(element) {
                gsap.fromTo(element, { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.3, ease: 'power2.out' });
            }

            static panelSlide(panel, isOpen) {
                if (isOpen) {
                    gsap.fromTo(panel, { opacity: 0, y: -20 }, { opacity: 1, y: 0, duration: 0.4, ease: 'back.out' });
                } else {
                    gsap.to(panel, { opacity: 0, y: -20, duration: 0.3, ease: 'power2.in' });
                }
            }

            static pageLoad(element) {
                gsap.fromTo(element, { opacity: 0, scale: 0.9 }, { opacity: 1, scale: 1, duration: 0.8, ease: 'back.out' });
            }
        }

        // Calculator Logic
        class CalculatorLogic {
            constructor() {
                this.currentValue = '0';
                this.previousValue = '';
                this.operation = null;
                this.shouldResetDisplay = false;
            }

            appendNumber(num) {
                if (num === '.' && this.currentValue.includes('.')) return;
                if (this.shouldResetDisplay) {
                    this.currentValue = num === '.' ? '0.' : num;
                    this.shouldResetDisplay = false;
                } else {
                    if (this.currentValue === '0' && num !== '.') {
                        this.currentValue = num;
                    } else {
                        this.currentValue += num;
                    }
                }
                if (this.currentValue.length > 16) this.currentValue = this.currentValue.slice(0, 16);
            }

            setOperation(op) {
                if (this.operation && !this.shouldResetDisplay) this.calculate();
                this.previousValue = this.currentValue;
                this.operation = op;
                this.shouldResetDisplay = true;
            }

            calculate() {
                if (!this.operation || this.shouldResetDisplay) return null;
                const prev = parseFloat(this.previousValue);
                const current = parseFloat(this.currentValue);
                let result;

                switch (this.operation) {
                    case '+': result = prev + current; break;
                    case '-': result = prev - current; break;
                    case '*': result = prev * current; break;
                    case '/': result = current !== 0 ? prev / current : null; break;
                    case '%': result = prev % current; break;
                    default: return null;
                }

                if (result === null) return null;
                this.currentValue = this.formatNumber(result);
                this.previousValue = '';
                this.operation = null;
                this.shouldResetDisplay = true;
                return result;
            }

            formatNumber(num) {
                if (!isFinite(num)) return '0';
                return parseFloat(num.toFixed(10)).toString();
            }

            clear() {
                this.currentValue = '0';
                this.previousValue = '';
                this.operation = null;
                this.shouldResetDisplay = false;
            }

            delete() {
                if (this.currentValue.length > 1) {
                    this.currentValue = this.currentValue.slice(0, -1);
                } else {
                    this.currentValue = '0';
                }
            }

            getDisplayValue() {
                return this.currentValue;
            }

            getHistoryDisplay() {
                if (this.operation) return `${this.previousValue} ${this.getOpDisplay(this.operation)}`;
                return '';
            }

            getOpDisplay(op) {
                const opMap = { '+': '+', '-': '−', '*': '×', '/': '÷', '%': '%' };
                return opMap[op] || op;
            }

            applyScienceFunction(func) {
                const num = parseFloat(this.currentValue);
                let result;

                switch (func) {
                    case 'sin': result = Math.sin(num * Math.PI / 180); break;
                    case 'cos': result = Math.cos(num * Math.PI / 180); break;
                    case 'tan': result = Math.tan(num * Math.PI / 180); break;
                    case 'sqrt': result = Math.sqrt(num); break;
                    case 'log': result = Math.log10(num); break;
                    case 'ln': result = Math.log(num); break;
                    case 'pow': result = num * num; break;
                    case 'cbrt': result = Math.cbrt(num); break;
                    default: return;
                }
                this.currentValue = this.formatNumber(result);
            }
        }

        // Theme Manager
        class ThemeManager {
            constructor() {
                this.isDarkMode = localStorage.getItem('isDarkMode') !== 'false';
                this.apply();
            }

            toggle() {
                this.isDarkMode = !this.isDarkMode;
                localStorage.setItem('isDarkMode', this.isDarkMode);
                this.apply();
            }

            apply() {
                if (!this.isDarkMode) {
                    document.body.classList.add('light-mode');
                } else {
                    document.body.classList.remove('light-mode');
                }
            }
        }

        // Main App
        class CalculatorApp {
            constructor() {
                this.logic = new CalculatorLogic();
                this.sound = new SoundEngine();
                this.theme = new ThemeManager();
                this.history = JSON.parse(localStorage.getItem('calcHistory')) || [];
                this.memory = parseFloat(localStorage.getItem('calcMemory')) || 0;
                this.scientificMode = false;
                this.initializeElements();
                this.setupEventListeners();
                this.setupPageAnimation();
            }

            initializeElements() {
                this.display = document.getElementById('display');
                this.displayHistory = document.getElementById('displayHistory');
                this.historyPanel = document.getElementById('historyPanel');
                this.historyList = document.getElementById('historyList');
                this.historyBtn = document.getElementById('historyBtn');
                this.soundBtn = document.getElementById('soundBtn');
                this.themeBtn = document.getElementById('themeBtn');
                this.scientificBtn = document.getElementById('scientificBtn');
                this.memoryIndicator = document.getElementById('memoryIndicator');
                this.memoryValue = document.getElementById('memoryValue');
                this.memoryButtons = document.getElementById('memoryButtons');
                this.scientificButtons = document.getElementById('scientificButtons');
                this.volumeControl = document.getElementById('volumeControl');
                
                // Initialize volume display
                document.getElementById('volumePercent').textContent = Math.round(this.sound.volume * 100) + '%';
                
                this.updateDisplay();
                this.updateSoundButton();
            }

            setupEventListeners() {
                document.querySelectorAll('[data-number]').forEach(btn => {
                    btn.addEventListener('click', (e) => this.handleNumberClick(e.target, e.target.dataset.number));
                });

                document.querySelectorAll('[data-operator]').forEach(btn => {
                    btn.addEventListener('click', (e) => this.handleOperatorClick(e.target, e.target.dataset.operator));
                });

                document.querySelectorAll('[data-action]').forEach(btn => {
                    btn.addEventListener('click', (e) => this.handleActionClick(e.target, e.target.dataset.action));
                });

                document.querySelectorAll('[data-function]').forEach(btn => {
                    btn.addEventListener('click', (e) => this.handleFunctionClick(e.target, e.target.dataset.function));
                });

                this.soundBtn.addEventListener('click', () => this.toggleSound());
                this.themeBtn.addEventListener('click', () => this.toggleTheme());
                this.historyBtn.addEventListener('click', () => this.toggleHistory());
                this.scientificBtn.addEventListener('click', () => this.toggleScientific());

                this.volumeControl.addEventListener('input', (e) => {
                    const volume = e.target.value / 100;
                    this.sound.setVolume(volume);
                    document.getElementById('volumePercent').textContent = e.target.value + '%';
                });

                window.addEventListener('keydown', (e) => this.handleKeyboard(e));

                document.querySelectorAll('button').forEach(btn => {
                    btn.addEventListener('touchstart', () => {
                        if (navigator.vibrate) navigator.vibrate(10);
                    });
                });
            }

            setupPageAnimation() {
                AnimationEngine.pageLoad(document.querySelector('.container'));
            }

            handleNumberClick(btn, num) {
                AnimationEngine.buttonPress(btn);
                AnimationEngine.ripple(btn, event.clientX, event.clientY);
                this.sound.playSound('click');
                this.logic.appendNumber(num);
                this.updateDisplay();
            }

            handleOperatorClick(btn, op) {
                AnimationEngine.buttonPress(btn);
                AnimationEngine.ripple(btn, event.clientX, event.clientY);
                this.sound.playSound('operator');
                this.logic.setOperation(op);
                this.updateDisplay();
            }

            handleActionClick(btn, action) {
                AnimationEngine.buttonPress(btn);
                AnimationEngine.ripple(btn, event.clientX, event.clientY);
                this.sound.playSound('click');

                if (action === 'clear') {
                    this.logic.clear();
                } else if (action === 'delete') {
                    this.logic.delete();
                } else if (action === 'equals') {
                    const result = this.logic.calculate();
                    if (result !== null) {
                        this.addToHistory(this.logic.previousValue, this.logic.operation, this.logic.currentValue);
                        this.sound.playSound('equals');
                    } else {
                        this.sound.playSound('error');
                    }
                }
                this.updateDisplay();
            }

            handleFunctionClick(btn, func) {
                AnimationEngine.buttonPress(btn);
                this.sound.playSound('click');
                this.logic.applyScienceFunction(func);
                this.updateDisplay();
            }

            handleKeyboard(e) {
                if (e.key >= '0' && e.key <= '9') this.logic.appendNumber(e.key);
                else if (e.key === '.') this.logic.appendNumber('.');
                else if (e.key === '+' || e.key === '-') this.logic.setOperation(e.key);
                else if (e.key === '*') { e.preventDefault(); this.logic.setOperation('*'); }
                else if (e.key === '/') { e.preventDefault(); this.logic.setOperation('/'); }
                else if (e.key === 'Enter' || e.key === '=') {
                    e.preventDefault();
                    const result = this.logic.calculate();
                    if (result !== null) {
                        this.addToHistory(this.logic.previousValue, this.logic.operation, this.logic.currentValue);
                        this.sound.playSound('equals');
                    }
                }
                else if (e.key === 'Backspace') this.logic.delete();
                else if (e.key === 'Escape') this.logic.clear();
                this.updateDisplay();
            }

            toggleSound() {
                const enabled = this.sound.toggle();
                this.updateSoundButton();
                this.sound.playSound('click');
            }

            updateSoundButton() {
                this.soundBtn.textContent = this.sound.enabled ? '🔊' : '🔇';
                this.soundBtn.classList.toggle('text-cyan-400', this.sound.enabled);
                
                // Update sound icon indicator at bottom
                const soundIcon = document.getElementById('soundIcon');
                soundIcon.textContent = this.sound.enabled ? '🔊' : '🔇';
                soundIcon.classList.remove('sound-pulse');
                if (this.sound.enabled) {
                    void soundIcon.offsetWidth; // Trigger reflow
                    soundIcon.classList.add('sound-pulse');
                }
            }

            toggleTheme() {
                this.theme.toggle();
                this.sound.playSound('click');
            }

            toggleHistory() {
                const isOpen = !this.historyPanel.classList.contains('hidden');
                if (isOpen) {
                    this.historyPanel.classList.add('hidden');
                } else {
                    this.historyPanel.classList.remove('hidden');
                }
                this.renderHistory();
            }

            toggleScientific() {
                this.scientificMode = !this.scientificMode;
                this.scientificButtons.classList.toggle('hidden', !this.scientificMode);
                this.memoryButtons.classList.toggle('hidden', !this.scientificMode);
                this.scientificBtn.classList.toggle('text-cyan-400', this.scientificMode);
                this.sound.playSound('click');
            }

            addToHistory(prev, op, curr) {
                const opDisplay = this.logic.getOpDisplay(op);
                const expression = `${prev} ${opDisplay} ${curr}`;
                this.history.unshift({ expression, result: this.logic.currentValue });
                if (this.history.length > 30) this.history.pop();
                localStorage.setItem('calcHistory', JSON.stringify(this.history));
                this.renderHistory();
            }

            renderHistory() {
                this.historyList.innerHTML = this.history.map((item, idx) => `
                    <div class="p-2 bg-gradient-to-r from-cyan-400/10 to-transparent rounded-lg cursor-pointer hover:from-cyan-400/20 transition-smooth"
                         onclick="app.loadFromHistory(${idx})">
                        <div class="text-xs text-gray-400">${item.expression}</div>
                        <div class="text-sm text-cyan-400 font-semibold">${item.result}</div>
                    </div>
                `).join('');
            }

            loadFromHistory(index) {
                this.logic.currentValue = this.history[index].result;
                this.logic.shouldResetDisplay = true;
                this.updateDisplay();
                this.toggleHistory();
            }

            updateDisplay() {
                const value = this.logic.getDisplayValue();
                this.display.textContent = value.length > 12 ? value.substring(0, 12) + '...' : value;
                this.displayHistory.textContent = this.logic.getHistoryDisplay();
                AnimationEngine.slideUpNumber(this.display);
            }
        }

        let app;
        document.addEventListener('DOMContentLoaded', () => {
            app = new CalculatorApp();
        });
    </script>
</body>
</html>
